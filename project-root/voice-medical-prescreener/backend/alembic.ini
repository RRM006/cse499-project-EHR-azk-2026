# Alembic configuration for the Voice Medical Pre-Screener.
#
# The schema is versioned with Alembic so columns can be added safely without
# dropping the SQLite database (e.g. the stt_provider fix). Migrations also run
# automatically at app startup (see backend/app/db/database.py:run_migrations).
#
# Run manually from the project root:
#   alembic -c backend/alembic.ini upgrade head
#
# NOTE: sqlalchemy.url is intentionally left blank here — the real URL comes from
# the app settings (backend/.env -> DATABASE_URL, default local SQLite) via env.py,
# so nothing is hardcoded and there is a single source of truth.

[alembic]
# %(here)s = the directory containing this ini file (backend/), so the path works
# regardless of the current working directory.
script_location = %(here)s/migrations
prepend_sys_path = .
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
